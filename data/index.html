<!DOCTYPE html>
<html>
  <head>
    <title>ESP IOT DASHBOARD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="gauge.min.js"></script>
  </head>
  <body>
    <div class="topnav">
      <h1>ESP WEB SERVER GAUGES</h1>
    </div>

    <div class="content">
      <div class="card-grid">
        <div class="card">
          <p class="card-title">Temperature</p>
          <canvas id="gauge-temperature"></canvas>
        </div>
        <div class="card">
          <p class="card-title">Humidity</p>
          <canvas id="gauge-humidity"></canvas>
        </div>
      </div>
    </div>

    <div class="control-grid">
      <div class="control-card">
        <h3>AUSGANG</h3>
        <button id="toggleBtn" class="toggle-btn off" onclick="toggleOutput()">AUS</button>
        <div class="status-label" id="outputStatus">GPIO 2 &rarr; LOW</div>
      </div>
      <div class="control-card">
        <h3>WERT (0 &ndash; 100)</h3>
        <div class="slider-row">
          <input type="range" id="slider" min="0" max="100" value="0"
                 oninput="document.getElementById('sliderDisplay').textContent = this.value">
          <span class="slider-value" id="sliderDisplay">0</span>
        </div>
        <button class="send-btn" onclick="sendSlider()">Senden</button>
        <div class="status-label" id="sliderStatus"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
